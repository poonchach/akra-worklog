<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Akra Worklogs</title>
<script>
const _cw = console.warn;
console.warn = (...a) => { if(String(a[0]).includes('Babel')) return; _cw(...a); };
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,sans-serif;background:#f1f5f9;min-height:100vh}input,select,button,textarea{font-family:inherit}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback}=React;

const GAS_URL="https://script.google.com/macros/s/AKfycbyWWiJlQFQsT_7PY4njK5vkpzG0YT_pHqN1_mIAQ8-o3vTLREMmErDgGb4zg0kouxpJ/exec";

const db={
  get:async(key)=>{
    try{const r=await fetch(`${GAS_URL}?key=${encodeURIComponent(key)}`);const j=await r.json();return j.ok?j.value:null;}
    catch(e){console.error("db.get error:",e);return null;}
  },
  set:async(key,value)=>{
    try{await fetch(GAS_URL,{method:"POST",body:JSON.stringify({key,value})});}
    catch(e){console.error("db.set error:",e);}
  },
  getBackupList:async()=>{
    try{const r=await fetch(`${GAS_URL}?key=__backup_list__`);const j=await r.json();return j.ok?j.value:[];}
    catch(e){console.error("db.getBackupList error:",e);return[];}
  },
  restoreBackup:async(dataKey,rowIndex=0)=>{
    try{const r=await fetch(`${GAS_URL}?key=__restore__${dataKey}__${rowIndex}`);const j=await r.json();return j.ok?j.value:null;}
    catch(e){console.error("db.restoreBackup error:",e);return null;}
  }
};

const INIT_USERS=[{id:1,username:"admin",password:"akraadmin",role:"admin",status:"active",displayName:"Admin"}];
const INIT_KLANG=["สวดถวาย","ปัดเสนียดลูกศิษย์/รถ/บ้านเมือง","ประสานทอง/7 จักระ/ร่างทอง","แนะนำลูกศิษย์","ดูแลอาคาร/สถานที่","จัด/เก็บปะรำ","ร้อยประคำ","แก้ฝัน","ส่งวิญญาณ"];
const INIT_WICHA=["ทำนาย","Consult","Reset","Sound Bath","วิถีอครา","Body Weight","คลาสวิถีอครา","ผูกดวง (พิธีสายมืด)","บรรยายคลาส","ร้องเพลง","สวดเติม"];
const ROLES={admin:"Administrative",supervisor:"Supervisor",user:"User"};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const tday=()=>new Date().toISOString().slice(0,10);
const fmtD=s=>{if(!s)return"-";const[y,m,d]=s.split("-");return`${d}/${m}/${y}`;};
const isAdmin=cu=>cu?.role==="admin";
const isSup=cu=>cu?.role==="admin"||cu?.role==="supervisor";
const canEdit=(log,cu)=>{
  if(!cu)return false;
  if(isAdmin(cu))return true;
  return log.username===cu.username;
};
const dlCSV=(headers,rows,name)=>{
  const body=[headers,...rows].map(r=>r.map(c=>`"${String(c??"").replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob(["\uFEFF"+body],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
};

const BL="#2563eb";
const s={
  card:{background:"#fff",borderRadius:12,border:"1px solid #e2e8f0",padding:20},
  inp:{width:"100%",padding:"8px 12px",border:"1px solid #cbd5e1",borderRadius:8,fontSize:13,outline:"none",boxSizing:"border-box"},
  sel:{width:"100%",padding:"8px 12px",border:"1px solid #cbd5e1",borderRadius:8,fontSize:13,background:"#fff",outline:"none",boxSizing:"border-box"}
};

function Btn({c="def",sm,full,disabled,onClick,children,style:st}){
  const base={display:"inline-flex",alignItems:"center",justifyContent:"center",gap:5,borderRadius:8,cursor:disabled?"not-allowed":"pointer",fontWeight:500,border:"none",whiteSpace:"nowrap",opacity:disabled?.5:1,width:full?"100%":"auto",fontSize:sm?12:13,padding:sm?"4px 10px":"8px 16px",...(st||{})};
  const m={def:{background:"#fff",color:"#374151",border:"1px solid #d1d5db"},pri:{background:BL,color:"#fff"},dan:{background:"#fef2f2",color:"#dc2626",border:"1px solid #fca5a5"},grn:{background:"#f0fdf4",color:"#16a34a",border:"1px solid #86efac"}};
  return <button onClick={onClick} disabled={disabled} style={{...base,...m[c]}}>{children}</button>;
}
function Inp({style:st,...p}){return <input {...p} style={{...s.inp,...(st||{})}}/>;}
function Sel({style:st,children,...p}){return <select {...p} style={{...s.sel,...(st||{})}}>{children}</select>;}
function FG({label,children}){return <div style={{marginBottom:14}}><label style={{fontSize:12,fontWeight:600,color:"#475569",marginBottom:4,display:"block"}}>{label}</label>{children}</div>;}
function HR(){return <div style={{height:1,background:"#e2e8f0",margin:"14px 0"}}/>;}
function SecH({children}){return <div style={{fontSize:11,fontWeight:700,color:"#94a3b8",letterSpacing:".07em",textTransform:"uppercase",marginBottom:8,paddingBottom:6,borderBottom:"1px solid #e2e8f0"}}>{children}</div>;}
function Chip({color,children}){const m={blue:["#dbeafe","#1d4ed8"],purple:["#ede9fe","#7c3aed"],gray:["#f1f5f9","#475569"]};const[bg,fg]=m[color]||m.gray;return <span style={{display:"inline-block",padding:"2px 8px",borderRadius:20,fontSize:11,fontWeight:600,background:bg,color:fg,margin:2}}>{children}</span>;}
function Toast({msg,type="info"}){
  const bg=type==="error"?"#dc2626":type==="ok"?"#16a34a":"#1e293b";
  return <div style={{position:"fixed",top:16,right:16,zIndex:1000,background:bg,color:"#fff",padding:"10px 18px",borderRadius:10,fontSize:13,boxShadow:"0 4px 20px rgba(0,0,0,.3)",maxWidth:300}}>{msg}</div>;
}
function SyncBar({status}){
  if(!status)return null;
  const cfg={syncing:["#fffbeb","#a16207","⟳ กำลัง sync..."],ok:["#dcfce7","#166534","✓ Sync สำเร็จ"],error:["#fef2f2","#dc2626","✗ Sync ล้มเหลว"]};
  const[bg,fg,msg]=cfg[status]||cfg.ok;
  return <div style={{position:"fixed",bottom:16,right:16,zIndex:999,background:bg,color:fg,padding:"6px 14px",borderRadius:20,fontSize:12,fontWeight:600,boxShadow:"0 2px 10px rgba(0,0,0,.15)",border:`1px solid ${fg}33`}}>{msg}</div>;
}
function ConfirmDlg({msg,onOk,onNo}){return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:16}}><div style={{background:"#fff",borderRadius:12,padding:24,maxWidth:340,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}><p style={{fontSize:14,color:"#374151",lineHeight:1.7,marginBottom:20,whiteSpace:"pre-line"}}>{msg}</p><div style={{display:"flex",justifyContent:"flex-end",gap:8}}><Btn onClick={onNo}>ยกเลิก</Btn><Btn c="dan" onClick={onOk}>ยืนยัน</Btn></div></div></div>;}
function AlertDlg({title,body,onClose,kind="ok"}){
  const colors={ok:["#dcfce7","#166534","#86efac"],info:["#dbeafe","#1e40af","#93c5fd"],warn:["#fffbeb","#92400e","#fde047"]};
  const[bg,fg,bd]=colors[kind]||colors.ok;
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,padding:16}}>
    <div style={{background:"#fff",borderRadius:14,maxWidth:420,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,.25)",overflow:"hidden"}}>
      <div style={{background:bg,borderBottom:`1px solid ${bd}`,padding:"16px 20px",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:22}}>{kind==="ok"?"✓":kind==="warn"?"⚠":"ℹ"}</span>
        <span style={{fontWeight:700,fontSize:16,color:fg}}>{title}</span>
      </div>
      <div style={{padding:"18px 20px"}}>{typeof body==="string"?<p style={{fontSize:14,color:"#374151",lineHeight:1.7}}>{body}</p>:body}</div>
      <div style={{padding:"0 20px 16px",display:"flex",justifyContent:"flex-end"}}><Btn c="pri" onClick={onClose}>ตกลง</Btn></div>
    </div>
  </div>;
}
function ModalWrap({title,onClose,children}){return <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:16}}><div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:560,maxHeight:"90vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}><div style={{padding:"14px 20px",borderBottom:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:"#fff"}}><span style={{fontWeight:700,fontSize:15}}>{title}</span><button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#94a3b8",lineHeight:1}}>×</button></div><div style={{padding:20}}>{children}</div></div></div>;}

function LogForm({init,onSave,onCancel,cu,users,masterKlang,masterWicha,existingLogs}){
  const blank={username:cu.username,date:tday(),timeIn:"",timeOut:"",kl:[{t:"",q:""}],wi:[{t:"",q:""}],ot:[{d:"",h:""}]};
  const[f,sf]=useState(()=>init?{...init,kl:init.phitiKlang?.length?init.phitiKlang.map(x=>({t:x.t,q:x.q})):[{t:"",q:""}],wi:init.phitiWicha?.length?init.phitiWicha.map(x=>({t:x.t,q:x.q})):[{t:"",q:""}],ot:init.others?.length?init.others.map(x=>({d:x.d,h:x.h})):[{d:"",h:""}]}:blank);
  const[dupeWarn,setDupeWarn]=useState(null);
  useEffect(()=>{
    if(!existingLogs||init)return;
    const found=existingLogs.find(l=>l.username===f.username&&l.date===f.date);
    setDupeWarn(found||null);
  },[f.username,f.date]);
  const loadExisting=()=>{if(!dupeWarn)return;sf({...dupeWarn,kl:dupeWarn.phitiKlang?.length?dupeWarn.phitiKlang.map(x=>({t:x.t,q:x.q})):[{t:"",q:""}],wi:dupeWarn.phitiWicha?.length?dupeWarn.phitiWicha.map(x=>({t:x.t,q:x.q})):[{t:"",q:""}],ot:dupeWarn.others?.length?dupeWarn.others.map(x=>({d:x.d,h:x.h})):[{d:"",h:""}]});setDupeWarn(null);};
  const up=(k,i,field,val)=>{const a=[...f[k]];a[i]={...a[i],[field]:val};sf(x=>({...x,[k]:a}));};
  const add=k=>sf(x=>({...x,[k]:[...x[k],k==="ot"?{d:"",h:""}:{t:"",q:""}]}));
  const rm=(k,i)=>sf(x=>({...x,[k]:x[k].filter((_,j)=>j!==i)}));
  const submit=()=>{if(!f.date){alert("กรุณาระบุวันที่");return;}onSave({username:f.username,date:f.date,timeIn:f.timeIn,timeOut:f.timeOut,phitiKlang:f.kl.filter(x=>x.t),phitiWicha:f.wi.filter(x=>x.t),others:f.ot.filter(x=>x.d)});};
  const rowStyle={display:"flex",alignItems:"center",gap:8,marginBottom:8,background:"#f8fafc",borderRadius:8,padding:"8px 10px"};
  const numBadge={width:18,height:18,borderRadius:"50%",background:"#e2e8f0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,flexShrink:0};
  const addBtn=(k,lb)=><button onClick={()=>add(k)} style={{width:"100%",padding:6,border:"1.5px dashed #cbd5e1",borderRadius:8,background:"none",cursor:"pointer",fontSize:12,color:"#64748b",marginBottom:12}}>+ {lb}</button>;
  return <>
    {dupeWarn&&<div style={{background:"#fffbeb",border:"1px solid #fde047",borderRadius:10,padding:"12px 16px",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
      <div><div style={{fontSize:13,fontWeight:600,color:"#a16207"}}>⚠ พบข้อมูลของวันนี้อยู่แล้ว</div><div style={{fontSize:12,color:"#92400e",marginTop:2}}>{fmtD(dupeWarn.date)} — {dupeWarn.phitiKlang?.length||0} พิธีกลาง, {dupeWarn.phitiWicha?.length||0} สายวิชา</div></div>
      <Btn sm c="grn" onClick={loadExisting}>โหลดข้อมูลเดิมมาแก้ไข</Btn>
    </div>}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:18}}>
      <FG label="ผู้ทำงาน *">{isAdmin(cu)?<Sel value={f.username} onChange={e=>sf(x=>({...x,username:e.target.value}))}>{users.filter(u=>u.status==="active").map(u=><option key={u.username} value={u.username}>{u.displayName||u.username}</option>)}</Sel>:<Inp value={cu.displayName||cu.username} disabled/>}</FG>
      <FG label="วันที่ *"><Inp type="date" value={f.date} onChange={e=>sf(x=>({...x,date:e.target.value}))}/></FG>
      <FG label="เวลาเข้า"><Inp type="time" value={f.timeIn} onChange={e=>sf(x=>({...x,timeIn:e.target.value}))}/></FG>
      <FG label="เวลาออก"><Inp type="time" value={f.timeOut} onChange={e=>sf(x=>({...x,timeOut:e.target.value}))}/></FG>
    </div>
    <SecH>พิธีกรรมหลัก</SecH>
    {f.kl.map((r,i)=><div key={i} style={rowStyle}><div style={numBadge}>{i+1}</div><div style={{flex:2}}><Sel value={r.t} onChange={e=>up("kl",i,"t",e.target.value)}><option value="">-- เลือก --</option>{masterKlang.map(m=><option key={m} value={m}>{m}</option>)}</Sel></div><div style={{flex:1}}><Inp type="number" min="0" placeholder="จำนวน" value={r.q} onChange={e=>up("kl",i,"q",e.target.value)}/></div>{f.kl.length>1&&<button onClick={()=>rm("kl",i)} style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:16,flexShrink:0}}>×</button>}</div>)}
    {addBtn("kl","เพิ่มพิธีกลาง")}<HR/>
    <SecH>พิธีกรรมสายวิชา</SecH>
    {f.wi.map((r,i)=><div key={i} style={rowStyle}><div style={numBadge}>{i+1}</div><div style={{flex:2}}><Sel value={r.t} onChange={e=>up("wi",i,"t",e.target.value)}><option value="">-- เลือก --</option>{masterWicha.map(m=><option key={m} value={m}>{m}</option>)}</Sel></div><div style={{flex:1}}><Inp type="number" min="0" placeholder="จำนวน" value={r.q} onChange={e=>up("wi",i,"q",e.target.value)}/></div>{f.wi.length>1&&<button onClick={()=>rm("wi",i)} style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:16,flexShrink:0}}>×</button>}</div>)}
    {addBtn("wi","เพิ่มสายวิชา")}<HR/>
    <SecH>งานอื่นๆ</SecH>
    {f.ot.map((r,i)=><div key={i} style={rowStyle}><div style={numBadge}>{i+1}</div><div style={{flex:3}}><Inp placeholder="ระบุงานที่ทำ" value={r.d} onChange={e=>up("ot",i,"d",e.target.value)}/></div><div style={{flex:1}}><Inp type="number" min="0" placeholder="ชม." value={r.h} onChange={e=>up("ot",i,"h",e.target.value)}/></div>{f.ot.length>1&&<button onClick={()=>rm("ot",i)} style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:16,flexShrink:0}}>×</button>}</div>)}
    {addBtn("ot","เพิ่มงานอื่นๆ")}
    <div style={{display:"flex",justifyContent:"flex-end",gap:8,paddingTop:12,borderTop:"1px solid #e2e8f0"}}>{onCancel&&<Btn onClick={onCancel}>ยกเลิก</Btn>}<Btn c="pri" onClick={submit}>บันทึก</Btn></div>
  </>;
}

function App(){
  const[loaded,setL]=useState(false);
  const[loadMsg,setLoadMsg]=useState("กำลังเชื่อมต่อ...");
  const[initError,setInitError]=useState(null);
  const[users,setU]=useState([]);
  const[mk,setMK]=useState([]);
  const[mw,setMW]=useState([]);
  const[logs,setLG]=useState([]);
  const[cu,setCu]=useState(null);
  const[tab,setTab]=useState("logs");
  const[toast,setT]=useState(null);
  const[syncStatus,setSyncStatus]=useState(null);
  const tRef=useRef();
  const syncRef=useRef();

  const notify=useCallback((msg,type="info")=>{setT({msg,type});clearTimeout(tRef.current);tRef.current=setTimeout(()=>setT(null),3500);},[]);
  const showSync=(st)=>{setSyncStatus(st);clearTimeout(syncRef.current);if(st!=="syncing")syncRef.current=setTimeout(()=>setSyncStatus(null),2500);};

  useEffect(()=>{(async()=>{
    try{
      setLoadMsg("โหลดข้อมูลผู้ใช้...");
      const u=await db.get("akra_users");
      setLoadMsg("โหลด log...");
      const lg=await db.get("akra_logs");
      setLoadMsg("โหลด master data...");
      const k=await db.get("akra_master_klang");
      const w=await db.get("akra_master_wicha");
      const initU=u||INIT_USERS;
      const initLG=lg||[];
      const initK=k||INIT_KLANG;
      const initW=w||INIT_WICHA;
      // Save เฉพาะตอนที่ GAS ยังไม่มีข้อมูลเลย (null) เท่านั้น ❌ ห้าม save ทับข้อมูลเดิม
      if(u===null){await db.set("akra_users",initU);}
      if(lg===null){await db.set("akra_logs",initLG);}
      if(k===null){await db.set("akra_master_klang",initK);}
      if(w===null){await db.set("akra_master_wicha",initW);}
      setU(initU);setLG(initLG);setMK(initK);setMW(initW);
      setL(true);
    }catch(e){
      console.error(e);
      setInitError("เชื่อมต่อ Google Apps Script ไม่ได้: "+e.message);
      setL(true);
    }
  })();},[]);

  const saveU=useCallback(async v=>{setU(v);showSync("syncing");try{await db.set("akra_users",v);showSync("ok");}catch{showSync("error");}}, []);
  const saveLG=useCallback(async v=>{setLG(v);showSync("syncing");try{await db.set("akra_logs",v);showSync("ok");}catch{showSync("error");}}, []);
  const saveMK=useCallback(async v=>{setMK(v);showSync("syncing");try{await db.set("akra_master_klang",v);showSync("ok");}catch{showSync("error");}}, []);
  const saveMW=useCallback(async v=>{setMW(v);showSync("syncing");try{await db.set("akra_master_wicha",v);showSync("ok");}catch{showSync("error");}}, []);

  useEffect(()=>{
    if(!loaded||initError)return;
    const iv=setInterval(async()=>{
      try{
        const[u,lg,k,w]=await Promise.all([db.get("akra_users"),db.get("akra_logs"),db.get("akra_master_klang"),db.get("akra_master_wicha")]);
        // อัปเดตเฉพาะถ้าข้อมูลที่ได้มาไม่ว่าง และ logs ไม่น้อยกว่าที่มีอยู่
        if(u&&Array.isArray(u)&&u.length>0)setU(u);
        if(lg&&Array.isArray(lg)&&lg.length>0)setLG(prev=>lg.length>=prev.length?lg:prev);
        if(k&&Array.isArray(k)&&k.length>0)setMK(k);
        if(w&&Array.isArray(w)&&w.length>0)setMW(w);
      }catch(e){console.warn("Auto-refresh failed:",e);}
    },30000);
    return()=>clearInterval(iv);
  },[loaded,initError]);

  if(!loaded)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",gap:16}}>
      <div style={{width:48,height:48,background:"#eff6ff",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:800,color:BL}}>AK</div>
      <div style={{fontSize:15,fontWeight:700,color:"#0f172a"}}>บันทึกเด็กดีอครา</div>
      <div style={{color:"#64748b",fontSize:13}}>{loadMsg}</div>
      <div style={{width:200,height:4,background:"#e2e8f0",borderRadius:4,overflow:"hidden"}}>
        <div style={{height:"100%",background:BL,borderRadius:4,animation:"pulse 1.5s ease-in-out infinite",width:"60%"}}/>
      </div>
      <style>{`@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}`}</style>
    </div>
  );

  if(initError)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",gap:12,padding:24}}>
      <div style={{fontSize:32}}>⚠️</div>
      <div style={{fontSize:16,fontWeight:700,color:"#dc2626"}}>เชื่อมต่อไม่สำเร็จ</div>
      <div style={{fontSize:13,color:"#64748b",textAlign:"center",maxWidth:400,lineHeight:1.7}}>{initError}</div>
      <Btn c="pri" onClick={()=>window.location.reload()}>ลองใหม่</Btn>
    </div>
  );

  if(!cu)return <LoginPage users={users} setCu={setCu} setTab={setTab} notify={notify} saveU={saveU} syncStatus={syncStatus}/>;

  const TABS=[{k:"entry",l:"บันทึก"},{k:"logs",l:"รายงาน Log"},{k:"bulk",l:"Bulk Upload"},...(isAdmin(cu)?[{k:"admin",l:"Back Office"}]:[])];
  const sp={cu,users,saveU,mk,saveMK,mw,saveMW,logs,saveLG,notify};

  return(
    <div style={{minHeight:"100vh",background:"#f1f5f9"}}>
      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
      <SyncBar status={syncStatus}/>

function BulkTab({logs,saveLG,mk,mw,notify}){

  const fRef=useRef();
  const dlT=()=>{const h=["username","date","timeIn","timeOut","phitiKlang","phitiWicha","others"];const ex=[["admin","2026-03-15","09:00","17:00","สวดถวาย|2;แนะนำลูกศิษย์|1","Sound Bath|1;Consult|2","ประสาน|1.5;ดูแล|0.5"]];const note=["# พิธีกรรม: ชื่อ|จำนวน;ชื่อ2|จำนวน2","# others: งาน|ชม.;งาน2|ชม.","# date: YYYY-MM-DD",""];const kl=mk.map((k,i)=>`# พิธีกลาง ${i+1}: ${k}`);const wl=mw.map((w,i)=>`# สายวิชา ${i+1}: ${w}`);const txt=note.join("\n")+h.join(",")+"\n"+ex.map(r=>r.map(c=>`"${c}"`).join(",")).join("\n")+"\n\n"+kl.join("\n")+"\n\n"+wl.join("\n");const b=new Blob(["\uFEFF"+txt],{type:"text/csv;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="akra_template.csv";document.body.appendChild(a);a.click();document.body.removeChild(a);};
  const parseF=file=>{const r=new FileReader();r.onload=e=>{const txt=e.target.result.replace(/^\uFEFF/,"").split("\n").filter(l=>!l.trim().startsWith("#")).join("\n").trim();const lines=txt.split("\n").map(l=>l.trim()).filter(Boolean);if(lines.length<2){setE(["ไม่พบข้อมูล"]);setP([]);setStep("prev");return;}const hdrs=lines[0].split(",").map(h=>h.replace(/^"|"$/g,"").trim());const good=[],bad=[];lines.slice(1).forEach((ln,ri)=>{const vals=[];let c="",q=false;for(let i=0;i<ln.length;i++){if(ln[i]==='"')q=!q;else if(ln[i]===","&&!q){vals.push(c.trim());c="";}else c+=ln[i];}vals.push(c.trim());const row={};hdrs.forEach((h,i)=>{row[h]=(vals[i]||"").replace(/^"|"$/g,"").trim();});const un=row.username||"",dt=row.date||"";if(!un){bad.push(`แถว ${ri+2}: ไม่มี username`);return;}if(!dt||!/^\d{4}-\d{2}-\d{2}$/.test(dt)){bad.push(`แถว ${ri+2}: date ไม่ถูกต้อง`);return;}const pI=v=>(v||"").split(";").map(s=>{const p=s.trim().split("|");return p[0].trim()?{t:p[0].trim(),q:p[1]?.trim()||"1"}:null;}).filter(Boolean);const pO=v=>(v||"").split(";").map(s=>{const p=s.trim().split("|");return p[0].trim()?{d:p[0].trim(),h:p[1]?.trim()||""}:null;}).filter(Boolean);good.push({id:uid(),username:un,date:dt,timeIn:row.timeIn||"",timeOut:row.timeOut||"",phitiKlang:pI(row.phitiKlang),phitiWicha:pI(row.phitiWicha),others:pO(row.others),createdAt:new Date().toISOString(),_src:"csv"});});setP(good);setE(bad);setStep("prev");};r.readAsText(file,"utf-8");};
  const dupCount=parsed.filter(nl=>logs.some(e=>e.username===nl.username&&e.date===nl.date)).length;
  const doImp=()=>{let ex=[...logs];let a=0,sk=0,rp=0;parsed.forEach(nl=>{const di=ex.findIndex(e=>e.username===nl.username&&e.date===nl.date);if(di===-1){ex.push(nl);a++;}else if(dupe==="replace"){ex[di]={...nl,id:ex[di].id};rp++;}else if(dupe==="both"){ex.push({...nl,id:uid()});a++;}else sk++;});saveLG(ex);setConfirmOpen(false);setResultDlg({added:a,replaced:rp,skipped:sk,errors:errs.length});setStep("done");};
  const reset=()=>{setStep("up");setP([]);setE([]);setResultDlg(null);if(fRef.current)fRef.current.value="";};
  const th={background:"#f8fafc",padding:"8px 12px",textAlign:"left",fontWeight:700,fontSize:11,color:"#64748b",borderBottom:"1px solid #e2e8f0"};const td2={padding:"8px 12px",borderBottom:"1px solid #f1f5f9",fontSize:12};
  if(step==="up")return <div style={{maxWidth:640}}>
    <h2 style={{fontSize:19,fontWeight:700,marginBottom:18}}>Bulk Upload จาก CSV</h2>
    <div style={{background:"linear-gradient(135deg,#eff6ff,#f0fdf4)",borderRadius:12,border:"1px solid #bfdbfe",padding:"18px 20px",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}><div><div style={{fontSize:14,fontWeight:700,color:"#1e40af",marginBottom:3}}>Step 1 – Download Template</div><div style={{fontSize:13,color:"#374151"}}>ดาวน์โหลด Template พร้อม Master List</div></div><Btn c="pri" onClick={dlT}>⬇ Download Template</Btn></div>
    <div style={s.card}><div style={{fontSize:14,fontWeight:700,marginBottom:12}}>Step 2 – อัปโหลดไฟล์ CSV</div><label style={{display:"block",border:"2px dashed #93c5fd",borderRadius:10,padding:"36px 16px",textAlign:"center",cursor:"pointer",background:"#f8faff",marginBottom:12}}><div style={{fontSize:14,fontWeight:700,color:"#1e40af",marginBottom:3}}>คลิกหรือลากไฟล์ .csv มาวาง</div><input ref={fRef} type="file" accept=".csv,.txt" style={{display:"none"}} onChange={e=>{if(e.target.files[0])parseF(e.target.files[0]);}}/></label></div>
  </div>;
  if(step==="prev")return <div>
    {confirmOpen&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,padding:16}}><div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:400,overflow:"hidden",boxShadow:"0 20px 60px rgba(0,0,0,.25)"}}><div style={{background:"#eff6ff",padding:"16px 20px",borderBottom:"1px solid #93c5fd"}}><div style={{fontWeight:700,fontSize:16,color:"#1e40af"}}>ยืนยันการ Import</div></div><div style={{padding:"18px 20px"}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>{[["นำเข้า",parsed.length,"#16a34a"],["ซ้ำ",dupCount,"#a16207"],["มีปัญหา",errs.length,"#dc2626"]].map(([lb,v,c])=><div key={lb} style={{background:"#f8fafc",borderRadius:8,padding:"10px 12px",textAlign:"center"}}><div style={{fontSize:22,fontWeight:800,color:c}}>{v}</div><div style={{fontSize:11,color:"#64748b",marginTop:2}}>{lb}</div></div>)}</div></div><div style={{padding:"0 20px 16px",display:"flex",justifyContent:"flex-end",gap:8}}><Btn onClick={()=>setConfirmOpen(false)}>ยกเลิก</Btn><Btn c="pri" onClick={doImp}>ยืนยัน</Btn></div></div></div>}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}><div><h2 style={{fontSize:19,fontWeight:700}}>Preview ก่อน Import</h2><p style={{fontSize:13,color:"#64748b",marginTop:3}}>พบ <b style={{color:"#16a34a"}}>{parsed.length}</b> รายการ{errs.length>0&&<> | <b style={{color:"#dc2626"}}>{errs.length}</b> มีปัญหา</>}{dupCount>0&&<> | <b style={{color:"#a16207"}}>{dupCount}</b> ซ้ำ</>}</p></div><div style={{display:"flex",gap:8}}><Btn onClick={reset}>กลับ</Btn><Btn c="pri" disabled={!parsed.length} onClick={()=>setConfirmOpen(true)}>Import ({parsed.length})</Btn></div></div>
    <div style={{...s.card,marginBottom:12}}><div style={{fontSize:13,fontWeight:600,marginBottom:8}}>หากพบข้อมูลซ้ำ:</div><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{[["skip","ข้ามรายการนั้น"],["replace","แทนที่ข้อมูลเดิม"],["both","เพิ่มทั้งสอง"]].map(([k,l])=><label key={k} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",padding:"6px 12px",borderRadius:8,border:`1.5px solid ${dupe===k?"#2563eb":"#e2e8f0"}`,background:dupe===k?"#eff6ff":"#fff",fontSize:13,fontWeight:dupe===k?600:400}}><input type="radio" name="dp" checked={dupe===k} onChange={()=>setDupe(k)}/>{l}</label>)}</div></div>
    {errs.length>0&&<div style={{background:"#fef2f2",borderRadius:10,border:"1px solid #fca5a5",padding:"10px 14px",marginBottom:12}}>{errs.map((e,i)=><div key={i} style={{fontSize:12,color:"#991b1b"}}>- {e}</div>)}</div>}
    {parsed.length>0&&<div style={{...s.card,padding:0,overflow:"auto"}}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>{["username","วันที่","พิธีกลาง","สายวิชา","ซ้ำ?"].map((h,i)=><th key={i} style={th}>{h}</th>)}</tr></thead><tbody>{parsed.map((l,i)=>{const isDup=logs.some(e=>e.username===l.username&&e.date===l.date);return<tr key={i} style={{background:isDup?"#fffbeb":i%2===0?"#fff":"#f8fafc"}}><td style={{...td2,fontWeight:600}}>{l.username}</td><td style={td2}>{fmtD(l.date)}</td><td style={{...td2,fontSize:11}}>{l.phitiKlang.map(x=>`${x.t}(${x.q})`).join(", ")||"-"}</td><td style={{...td2,fontSize:11}}>{l.phitiWicha.map(x=>`${x.t}(${x.q})`).join(", ")||"-"}</td><td style={{...td2,textAlign:"center"}}>{isDup?<span style={{color:"#a16207",fontWeight:600,fontSize:11}}>ซ้ำ</span>:"-"}</td></tr>;})}</tbody></table></div>}
  </div>;
  return <div style={{textAlign:"center",padding:"56px 0"}}>
    {resultDlg&&<AlertDlg kind="ok" title="Import สำเร็จ!" onClose={()=>setResultDlg(null)} body={<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10}}>{[["เพิ่มใหม่",resultDlg.added,"#16a34a"],["แทนที่",resultDlg.replaced,"#2563eb"],["ข้าม",resultDlg.skipped,"#64748b"],["มีปัญหา",resultDlg.errors,"#dc2626"]].map(([lb,v,c])=><div key={lb} style={{background:"#f8fafc",borderRadius:8,padding:"12px 8px",textAlign:"center"}}><div style={{fontSize:26,fontWeight:800,color:c}}>{v}</div><div style={{fontSize:11,color:"#64748b",marginTop:2}}>{lb}</div></div>)}</div>}/>}
    <div style={{fontSize:22,fontWeight:700,color:"#16a34a",marginBottom:8}}>Import สำเร็จ!</div>
    <p style={{fontSize:14,color:"#64748b",marginBottom:22}}>ไปที่ "รายงาน Log" เพื่อตรวจสอบ</p>
    <Btn c="pri" onClick={reset}>Upload เพิ่มเติม</Btn>
  </div>;
}

function AdminTab({cu,users,saveU,mk,saveMK,mw,saveMW,logs,saveLG,notify}){
  const[sub,setSub]=useState("users");const[showAdd,setAdd]=useState(false);const[editU,setEU]=useState(null);const[delU,setDU]=useState(null);
  // ── NEW: track which user cards have password visible ──
  const[showPwIds,setShowPwIds]=useState(new Set());
  const togglePw=id=>setShowPwIds(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});

  const fRef=useRef();
  const doExp=()=>{try{const b=new Blob([JSON.stringify({users,masterKlang:mk,masterWicha:mw,logs},null,2)],{type:"application/json;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`akra-backup-${tday()}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);notify("Export สำเร็จ","ok");}catch{notify("Export ล้มเหลว","error");}};
  const doImp=file=>{if(!file)return;const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.users)saveU(d.users);if(d.masterKlang)saveMK(d.masterKlang);if(d.masterWicha)saveMW(d.masterWicha);if(d.logs)saveLG(d.logs);notify("Import JSON สำเร็จ","ok");}catch{notify("ไฟล์ไม่ถูกต้อง","error");}};r.readAsText(file);};
  const rc={admin:["#fef9c3","#a16207"],supervisor:["#dbeafe","#1d4ed8"],user:["#f1f5f9","#475569"]};
  const tabs=[{k:"users",l:"ผู้ใช้"},{k:"klang",l:"พิธีกลาง"},{k:"wicha",l:"สายวิชา"},{k:"json",l:"Import/Export JSON"},{k:"backup",l:"☁️ Backup History"}];

  function MList({which}){const list=which==="klang"?mk:mw;const save=which==="klang"?saveMK:saveMW;const[nv,setNv]=useState("");const[ei,setEi]=useState(null);const[ev,setEv]=useState("");const add=()=>{const v=nv.trim();if(!v)return;if(list.includes(v)){notify("มีรายการนี้อยู่แล้ว");return;}save([...list,v]);setNv("");notify("เพิ่มสำเร็จ","ok");};const rm=i=>save(list.filter((_,j)=>j!==i));const ce=()=>{const v=ev.trim();if(!v)return;if(list.includes(v)&&list[ei]!==v){notify("มีชื่อนี้อยู่แล้ว");return;}save(list.map((x,i)=>i===ei?v:x));setEi(null);setEv("");notify("แก้ไขสำเร็จ","ok");};return <div style={{maxWidth:480}}><div style={{display:"flex",gap:8,marginBottom:14}}><Inp value={nv} onChange={e=>setNv(e.target.value)} placeholder="ระบุชื่อรายการใหม่" onKeyDown={e=>e.key==="Enter"&&add()} style={{flex:1}}/><Btn c="pri" onClick={add}>+ เพิ่ม</Btn></div>{list.length===0?<p style={{color:"#94a3b8",textAlign:"center",padding:16}}>ยังไม่มีข้อมูล</p>:list.map((item,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:8,background:"#f8fafc",marginBottom:6,border:`1.5px solid ${ei===i?"#2563eb":"transparent"}`}}>{ei===i?<><Inp value={ev} onChange={e=>setEv(e.target.value)} autoFocus onKeyDown={e=>{if(e.key==="Enter")ce();if(e.key==="Escape"){setEi(null);setEv("");}}} style={{flex:1,padding:"5px 10px",fontSize:13}}/><Btn sm c="pri" onClick={ce}>บันทึก</Btn><Btn sm onClick={()=>{setEi(null);setEv("");}}>ยกเลิก</Btn></>:<><span style={{flex:1,fontSize:13}}>{item}</span><Btn sm onClick={()=>{setEi(i);setEv(item);}}>แก้ไข</Btn><Btn sm c="dan" onClick={()=>rm(i)}>ลบ</Btn></>}</div>)}</div>;}

  function UModal({u,onClose}){const isE=!!u;const[n,setN]=useState(u?.displayName||"");const[un,setUn]=useState(u?.username||"");const[pw,setPw]=useState("");const[rl,setRl]=useState(u?.role||"user");const[st,setSt]=useState(u?.status||"active");const save=()=>{if(!isE){if(!un||!pw){notify("กรุณากรอก Username และ Password","error");return;}if(users.find(x=>x.username===un)){notify("Username นี้มีในระบบแล้ว","error");return;}saveU([...users,{id:uid(),username:un,password:pw,displayName:n||un,role:rl,status:st}]);}else{saveU(users.map(x=>x.id===u.id?{...x,displayName:n||x.displayName,role:rl,status:st,...(pw?{password:pw}:{})}:x));}notify("บันทึกสำเร็จ","ok");onClose();};return <ModalWrap title={isE?"แก้ไขผู้ใช้":"เพิ่มผู้ใช้ใหม่"} onClose={onClose}><FG label="ชื่อที่แสดง"><Inp value={n} onChange={e=>setN(e.target.value)}/></FG><FG label="Username *"><Inp value={un} onChange={e=>setUn(e.target.value)} disabled={isE}/></FG><FG label={isE?"Password (เว้นว่างถ้าไม่เปลี่ยน)":"Password *"}><Inp type="password" value={pw} onChange={e=>setPw(e.target.value)}/></FG><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><FG label="Role"><Sel value={rl} onChange={e=>setRl(e.target.value)}><option value="user">User</option><option value="supervisor">Supervisor</option><option value="admin">Administrative</option></Sel></FG><FG label="Status"><Sel value={st} onChange={e=>setSt(e.target.value)}><option value="active">Active</option><option value="inactive">Inactive</option></Sel></FG></div><div style={{background:"#fffbeb",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#92400e",lineHeight:1.6,marginBottom:12}}>User=บันทึก/แก้ไข log ตัวเอง | Supervisor=ดู+Download | Admin=จัดการทั้งหมด</div><div style={{display:"flex",justifyContent:"flex-end",gap:8}}><Btn onClick={onClose}>ยกเลิก</Btn><Btn c="pri" onClick={save}>{isE?"บันทึก":"+ เพิ่ม"}</Btn></div></ModalWrap>;}

  return <>
    {delU&&<ConfirmDlg msg={`ลบผู้ใช้ "${users.find(u=>u.id===delU)?.username}"?`} onOk={()=>{saveU(users.filter(u=>u.id!==delU));setDU(null);notify("ลบสำเร็จ","ok");}} onNo={()=>setDU(null)}/>}
    {(showAdd||editU)&&<UModal u={editU} onClose={()=>{setAdd(false);setEU(null);}}/>}
    <h2 style={{fontSize:19,fontWeight:700,marginBottom:18}}>Back Office</h2>
    <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}}>{tabs.map(t=><button key={t.k} onClick={()=>setSub(t.k)} style={{padding:"7px 16px",borderRadius:8,border:`1.5px solid ${sub===t.k?"#2563eb":"#e2e8f0"}`,background:sub===t.k?"#eff6ff":"#fff",color:sub===t.k?"#2563eb":"#374151",fontWeight:sub===t.k?600:400,fontSize:13,cursor:"pointer"}}>{t.l}</button>)}</div>

    {sub==="users"&&<>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <span style={{fontSize:14,fontWeight:700}}>ผู้ใช้งาน {users.length} คน</span>
        <Btn c="pri" onClick={()=>setAdd(true)}>+ เพิ่มผู้ใช้</Btn>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:12}}>
        {users.map(u=>{
          const[rbg,rcl]=rc[u.role]||rc.user;
          const pwVisible=showPwIds.has(u.id);
          return(
            <div key={u.id} style={{...s.card,padding:14}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                {/* Avatar */}
                <div style={{width:42,height:42,borderRadius:"50%",background:"#eff6ff",color:"#2563eb",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:15,flexShrink:0}}>
                  {(u.displayName||u.username).slice(0,2).toUpperCase()}
                </div>
                {/* Info */}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.displayName||u.username}</div>
                  <div style={{fontSize:11,color:"#64748b",marginBottom:4}}>{u.username}</div>
                  <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
                    <span style={{fontSize:10,fontWeight:600,padding:"2px 6px",borderRadius:20,background:rbg,color:rcl}}>{ROLES[u.role]}</span>
                    <span style={{fontSize:10,fontWeight:600,padding:"2px 6px",borderRadius:20,background:u.status==="active"?"#dcfce7":"#fef2f2",color:u.status==="active"?"#166534":"#dc2626"}}>{u.status==="active"?"Active":"Inactive"}</span>
                  </div>
                </div>
                {/* Action buttons */}
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  <Btn sm onClick={()=>setEU(u)}>แก้ไข</Btn>
                  {u.username!=="admin"&&<Btn sm c="dan" onClick={()=>setDU(u.id)}>ลบ</Btn>}
                </div>
              </div>

              {/* ── Password row (admin only) ── */}
              <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #f1f5f9",display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:11,color:"#94a3b8",minWidth:60}}>Password:</span>
                <span style={{
                  flex:1,fontSize:12,fontFamily:"monospace",
                  background:pwVisible?"#f8fafc":"#f1f5f9",
                  border:"1px solid #e2e8f0",
                  borderRadius:6,padding:"3px 8px",
                  color:pwVisible?"#0f172a":"transparent",
                  textShadow:pwVisible?"none":"0 0 8px rgba(0,0,0,0.5)",
                  userSelect:pwVisible?"text":"none",
                  letterSpacing:pwVisible?"normal":"2px",
                  transition:"all 0.2s"
                }}>
                  {pwVisible ? u.password : "••••••••"}
                </span>
                <button
                  onClick={()=>togglePw(u.id)}
                  title={pwVisible?"ซ่อน Password":"แสดง Password"}
                  style={{background:"none",border:"1px solid #e2e8f0",borderRadius:6,padding:"3px 7px",cursor:"pointer",fontSize:14,color:"#64748b",lineHeight:1,flexShrink:0}}
                >
                  {pwVisible?"🙈":"👁"}
                </button>
              </div>
            </div>
          );
        })}
      </div>
    </>}

    {sub==="klang"&&<><h3 style={{fontSize:14,fontWeight:700,marginBottom:12}}>พิธีกรรมหลัก</h3><MList which="klang"/></>}
    {sub==="wicha"&&<><h3 style={{fontSize:14,fontWeight:700,marginBottom:12}}>พิธีกรรมสายวิชา</h3><MList which="wicha"/></>}
    {sub==="json"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,maxWidth:600}}><div style={s.card}><h3 style={{fontSize:14,fontWeight:700,marginBottom:6}}>Export JSON</h3><p style={{fontSize:13,color:"#64748b",marginBottom:14}}>Backup ข้อมูลทั้งหมด</p><Btn c="pri" onClick={doExp}>⬇ Download JSON</Btn></div><div style={s.card}><h3 style={{fontSize:14,fontWeight:700,marginBottom:6}}>Import JSON</h3><p style={{fontSize:13,color:"#64748b",marginBottom:14}}>Restore จากไฟล์ backup</p><label style={{border:"1.5px dashed #cbd5e1",borderRadius:9,padding:14,textAlign:"center",cursor:"pointer",display:"block"}}><div style={{fontSize:13,fontWeight:600}}>เลือกไฟล์ .json</div><input ref={fRef} type="file" accept=".json" style={{display:"none"}} onChange={e=>{doImp(e.target.files[0]);if(fRef.current)fRef.current.value="";}} /></label></div></div>}
    {sub==="backup"&&<BackupTab users={users} logs={logs} mk={mk} mw={mw} saveU={saveU} saveLG={saveLG} saveMK={saveMK} saveMW={saveMW} notify={notify}/>}
  </>;
}

function BackupTab({users,logs,mk,mw,saveU,saveLG,saveMK,saveMW,notify}){
  const[backupList,setBL]=useState(null);
  const[loading,setLoading]=useState(false);
  const[restoring,setRestoring]=useState(null);
  const KEYS=[
    {key:"akra_users",label:"ผู้ใช้งาน",save:saveU,current:users},
    {key:"akra_logs",label:"บันทึก Log",save:saveLG,current:logs},
    {key:"akra_master_klang",label:"พิธีกลาง",save:saveMK,current:mk},
    {key:"akra_master_wicha",label:"สายวิชา",save:saveMW,current:mw},
  ];
  const loadList=async()=>{setLoading(true);const list=await db.getBackupList();setBL(list);setLoading(false);};
  useEffect(()=>{loadList();},[]);
  const fmtTs=ts=>{try{return new Date(ts).toLocaleString("th-TH",{dateStyle:"short",timeStyle:"short"});}catch{return ts;}};
  const handleRestore=async(dataKey,label,rowIndex)=>{
    if(!window.confirm(`Restore "${label}" จาก backup นี้?\n\nข้อมูลปัจจุบันจะถูกแทนที่ด้วย backup`))return;
    setRestoring(dataKey+"_"+rowIndex);
    const data=await db.restoreBackup(dataKey,rowIndex);
    if(!data){notify("ไม่สามารถ restore ได้ กรุณาลองใหม่","error");setRestoring(null);return;}
    const found=KEYS.find(k=>k.key===dataKey);
    if(found){await found.save(data);notify(`✅ Restore "${label}" สำเร็จ (${Array.isArray(data)?data.length:"N/A"} รายการ)`,"ok");}
    setRestoring(null);await loadList();
  };
  const grouped={};
  (backupList||[]).forEach(r=>{if(!grouped[r.key])grouped[r.key]=[];grouped[r.key].push(r);});
  Object.keys(grouped).forEach(k=>{grouped[k].reverse();});
  const th={background:"#f8fafc",padding:"8px 12px",textAlign:"left",fontWeight:700,fontSize:11,color:"#64748b",borderBottom:"1px solid #e2e8f0"};
  const td={padding:"8px 12px",borderBottom:"1px solid #f1f5f9",fontSize:12,verticalAlign:"middle"};
  return <div style={{maxWidth:800}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div><h3 style={{fontSize:15,fontWeight:700}}>☁️ Backup History</h3><p style={{fontSize:12,color:"#64748b",marginTop:3}}>ข้อมูลถูก backup อัตโนมัติทุกครั้งที่มีการบันทึก เก็บไว้ใน Google Sheet ส่วนกลาง</p></div>
      <Btn sm onClick={loadList} disabled={loading}>{loading?"กำลังโหลด...":"🔄 Refresh"}</Btn>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10,marginBottom:18}}>
      {KEYS.map(({key,label,current})=>(
        <div key={key} style={{...s.card,padding:"12px 14px"}}>
          <div style={{fontSize:11,color:"#64748b",marginBottom:2}}>{label}</div>
          <div style={{fontSize:20,fontWeight:800,color:BL}}>{Array.isArray(current)?current.length:"-"}</div>
          <div style={{fontSize:10,color:"#94a3b8"}}>รายการปัจจุบัน</div>
        </div>
      ))}
    </div>
    {loading&&<div style={{textAlign:"center",padding:32,color:"#94a3b8"}}>กำลังโหลด backup list จาก Google Sheet...</div>}
    {!loading&&backupList!==null&&backupList.length===0&&(
      <div style={{...s.card,textAlign:"center",padding:32,color:"#94a3b8"}}>
        <div style={{fontSize:32,marginBottom:8}}>📭</div>
        <div>ยังไม่มี backup ใน Google Sheet</div>
        <div style={{fontSize:12,marginTop:4}}>Backup จะถูกสร้างอัตโนมัติหลังจากมีการบันทึกข้อมูลค่ะ</div>
      </div>
    )}
    {!loading&&Object.keys(grouped).map(key=>{
      const info=KEYS.find(k=>k.key===key);
      const rows=grouped[key];
      return(
        <div key={key} style={{...s.card,padding:0,marginBottom:14,overflow:"hidden"}}>
          <div style={{background:"#f8fafc",padding:"10px 16px",borderBottom:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontWeight:700,fontSize:13}}>{info?.label||key}</span>
            <span style={{fontSize:11,color:"#94a3b8"}}>{rows.length} snapshots</span>
          </div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr><th style={th}>#</th><th style={th}>เวลา backup</th><th style={th}>จำนวน</th><th style={th}>จัดการ</th></tr></thead>
              <tbody>{rows.slice(0,10).map((r,i)=>(
                <tr key={i} style={{background:i===0?"#f0fdf4":"#fff"}}>
                  <td style={{...td,color:"#94a3b8"}}>{i===0?<span style={{color:"#16a34a",fontWeight:600}}>ล่าสุด</span>:`-${i}`}</td>
                  <td style={td}>{fmtTs(r.timestamp)}</td>
                  <td style={td}><span style={{fontWeight:600,color:BL}}>{r.record_count}</span> รายการ</td>
                  <td style={td}><Btn sm c="grn" disabled={restoring===key+"_"+i} onClick={()=>handleRestore(key,info?.label||key,i)}>{restoring===key+"_"+i?"กำลัง restore...":"↩ Restore"}</Btn></td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
      );
    })}
    <div style={{padding:"10px 14px",background:"#fffbeb",border:"1px solid #fde047",borderRadius:10,fontSize:12,color:"#92400e",marginTop:4}}>
      💡 ระบบเก็บ backup ไว้ <b>30 snapshots ล่าสุดต่อ key</b> — กด Restore เพื่อกู้คืนข้อมูลจาก snapshot ที่ต้องการค่ะ
    </div>
  </div>;
}

function ProfileTab({cu,setCu,users,saveU,notify,back}){
  const[dn,setDn]=useState(cu.displayName||"");const[op,setOp]=useState("");const[np,setNp]=useState("");const[cp,setCp]=useState("");
  const save=()=>{if(!dn.trim()){notify("กรุณากรอกชื่อที่แสดง","error");return;}let upd={displayName:dn.trim()};if(np){if(op!==cu.password){notify("Password เดิมไม่ถูกต้อง","error");return;}if(np!==cp){notify("Password ใหม่ไม่ตรงกัน","error");return;}if(np.length<4){notify("Password ต้องมีอย่างน้อย 4 ตัวอักษร","error");return;}upd.password=np;}const n=users.map(u=>u.id===cu.id?{...u,...upd}:u);saveU(n);setCu({...cu,...upd});notify("บันทึกสำเร็จ!","ok");back();};
  return <div style={{maxWidth:440}}>
    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}><button onClick={back} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#94a3b8"}}>←</button><h2 style={{fontSize:19,fontWeight:700,margin:0}}>แก้ไขโปรไฟล์</h2></div>
    <div style={s.card}>
      <div style={{background:"#eff6ff",borderRadius:10,padding:"12px 14px",marginBottom:16,display:"flex",gap:10,alignItems:"center"}}><div style={{width:40,height:40,borderRadius:"50%",background:"#2563eb",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:15}}>{(cu.displayName||cu.username).slice(0,2).toUpperCase()}</div><div><div style={{fontSize:13,fontWeight:600}}>{cu.username}</div><div style={{fontSize:11,color:"#64748b"}}>{ROLES[cu.role]}</div></div></div>
      <FG label="ชื่อที่แสดง *"><Inp value={dn} onChange={e=>setDn(e.target.value)}/></FG><HR/>
      <p style={{fontSize:13,fontWeight:600,marginBottom:12,color:"#374151"}}>เปลี่ยน Password (เว้นว่างถ้าไม่ต้องการเปลี่ยน)</p>
      <FG label="Password เดิม"><Inp type="password" value={op} onChange={e=>setOp(e.target.value)} placeholder="ระบุ password เดิม"/></FG>
      <FG label="Password ใหม่"><Inp type="password" value={np} onChange={e=>setNp(e.target.value)} placeholder="ระบุ password ใหม่"/></FG>
      <FG label="ยืนยัน Password ใหม่"><Inp type="password" value={cp} onChange={e=>setCp(e.target.value)} placeholder="ยืนยัน password ใหม่"/></FG>
      <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:4}}><Btn onClick={back}>ยกเลิก</Btn><Btn c="pri" onClick={save}>บันทึก</Btn></div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
